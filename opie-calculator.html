    font-weight: 700;

  }

    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  input, select {
    width: 100%;
    background: #0f3460;
    border: 1px solid #1a4a8a;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.95rem;
    padding: 0.55rem 0.8rem;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  input[readonly] {
    background: #0a2040;
    color: #53d8fb;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 0.05em;
    font-weight: 700;
    cursor: default;
  }
  .input-wrap { position: relative; }
  .input-wrap input { padding-right: 2.4rem; }
  .copy-btn {
    position: absolute;
    right: 0.45rem;
    top: 50%;
    transform: translateY(-50%);
    width: 1.6rem;
    height: 1.6rem;
    padding: 0;
    margin: 0;
    background: transparent;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    color: #4b6a9a;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s, transform 0.1s;

  .copy-btn:active { transform: translateY(-50%) scale(0.88); }
  .copy-btn.copied { color: #4ade80; }

    width: 100%;
    margin-top: 0.5rem;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0.7rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.98); }
  .options-row {
    display: flex;
    gap: 1.4rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-label input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    accent-color: #e94560;
    cursor: pointer;
    flex-shrink: 0;
  }

    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    background: #3b1a1a;
    border: 1px solid #7f2020;
    border-radius: 6px;
    color: #f87171;
    font-size: 0.85rem;
    display: none;
  }
  .error.visible { display: block; }
  .info {
    margin-top: 0.6rem;
    font-size: 0.75rem;
    color: #4b5563;
  }

<body>
<div class="card">
  <h1>OPIE / S/Key Calculator</h1>
  <p class="subtitle">RFC 2289 — One-Time Password System</p>

  <div class="field">
    <label for="challenge">Challenge</label>
    <input type="text" id="challenge" placeholder="otp-md5 499 host99373" oninput="onChallengeChange()">
  </div>

  <div class="field">
    <label for="algorithm">Algorithm</label>
    <select id="algorithm">
      <option value="md4">MD4</option>
      <option value="md5" selected>MD5</option>
      <option value="sha1">SHA1</option>
    </select>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Secret passphrase" autocomplete="off">
      <button class="copy-btn" id="eyeBtn" title="Show / hide password" onclick="togglePassword()">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="field">
    <label for="result">Result</label>
    <div class="input-wrap">
      <input type="text" id="result" readonly placeholder="—">
      <button class="copy-btn" id="copyBtn" title="Copy to clipboard" onclick="copyResult()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="options-row">
    <label class="checkbox-label">
      <input type="checkbox" id="autoDecrement"> Auto-decrement sequence
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="autoCopy"> Auto-copy to clipboard
    </label>
  </div>

  <button onclick="calculate()">Calculate</button>
  <div id="error" class="error"></div>
  <p class="info">Challenge format: otp-{md4|md5|sha1} &lt;sequence&gt; &lt;seed&gt;</p>
</div>

// ─── MD4 (RFC 1320) ───────────────────────────────────────────────────────────
function md4(input) {
  const msg = toBytes(input);
  const len = msg.length;
  const bitLen = len * 8;
  const padLen = len % 64 < 56 ? 56 - len % 64 : 120 - len % 64;
  const buf = new Uint8Array(len + padLen + 8);
  buf.set(msg);
  buf[len] = 0x80;
  const dv = new DataView(buf.buffer);
  dv.setUint32(len + padLen,     bitLen >>> 0,              true);
  dv.setUint32(len + padLen + 4, Math.floor(bitLen / 2**32), true);

  let A = 0x67452301, B = 0xEFCDAB89, C = 0x98BADCFE, D = 0x10325476;

  const rotl = (x, n) => (x << n) | (x >>> (32 - n));
  const add  = (a, b) => (a + b) | 0;

  for (let i = 0; i < buf.length; i += 64) {
    const X = [];
    for (let j = 0; j < 16; j++) X[j] = dv.getInt32(i + j * 4, true);

    let a = A, b = B, c = C, d = D;

    // Round 1 — F(b,c,d) = (b&c)|(~b&d)
    const FF = (a,b,c,d,k,s) => rotl(add(add(a, (b&c)|(~b&d)), X[k]), s);
    a=FF(a,b,c,d, 0, 3); d=FF(d,a,b,c, 1, 7); c=FF(c,d,a,b, 2,11); b=FF(b,c,d,a, 3,19);
    a=FF(a,b,c,d, 4, 3); d=FF(d,a,b,c, 5, 7); c=FF(c,d,a,b, 6,11); b=FF(b,c,d,a, 7,19);
    a=FF(a,b,c,d, 8, 3); d=FF(d,a,b,c, 9, 7); c=FF(c,d,a,b,10,11); b=FF(b,c,d,a,11,19);
    a=FF(a,b,c,d,12, 3); d=FF(d,a,b,c,13, 7); c=FF(c,d,a,b,14,11); b=FF(b,c,d,a,15,19);

    // Round 2 — G(b,c,d) = (b&c)|(b&d)|(c&d), const 0x5A827999
    const GG = (a,b,c,d,k,s) => rotl(add(add(add(a, (b&c)|(b&d)|(c&d)), X[k]), 0x5A827999), s);
    a=GG(a,b,c,d, 0, 3); d=GG(d,a,b,c, 4, 5); c=GG(c,d,a,b, 8, 9); b=GG(b,c,d,a,12,13);
    a=GG(a,b,c,d, 1, 3); d=GG(d,a,b,c, 5, 5); c=GG(c,d,a,b, 9, 9); b=GG(b,c,d,a,13,13);
    a=GG(a,b,c,d, 2, 3); d=GG(d,a,b,c, 6, 5); c=GG(c,d,a,b,10, 9); b=GG(b,c,d,a,14,13);
    a=GG(a,b,c,d, 3, 3); d=GG(d,a,b,c, 7, 5); c=GG(c,d,a,b,11, 9); b=GG(b,c,d,a,15,13);

    // Round 3 — H(b,c,d) = b^c^d, const 0x6ED9EBA1
    const HH = (a,b,c,d,k,s) => rotl(add(add(add(a, b^c^d), X[k]), 0x6ED9EBA1), s);
    a=HH(a,b,c,d, 0, 3); d=HH(d,a,b,c, 8, 9); c=HH(c,d,a,b, 4,11); b=HH(b,c,d,a,12,15);
    a=HH(a,b,c,d, 2, 3); d=HH(d,a,b,c,10, 9); c=HH(c,d,a,b, 6,11); b=HH(b,c,d,a,14,15);
    a=HH(a,b,c,d, 1, 3); d=HH(d,a,b,c, 9, 9); c=HH(c,d,a,b, 5,11); b=HH(b,c,d,a,13,15);
    a=HH(a,b,c,d, 3, 3); d=HH(d,a,b,c,11, 9); c=HH(c,d,a,b, 7,11); b=HH(b,c,d,a,15,15);

    A = add(A, a); B = add(B, b); C = add(C, c); D = add(D, d);
  }

  const out = new Uint8Array(16);
  const ov = new DataView(out.buffer);
  ov.setInt32(0, A, true); ov.setInt32(4, B, true);
  ov.setInt32(8, C, true); ov.setInt32(12, D, true);
  return out;
}

// ─── MD5 (RFC 1321) ───────────────────────────────────────────────────────────
function md5(input) {
  const msg = toBytes(input);
  const len = msg.length;
  const bitLen = len * 8;
  const padLen = len % 64 < 56 ? 56 - len % 64 : 120 - len % 64;
  const buf = new Uint8Array(len + padLen + 8);
  buf.set(msg);
  buf[len] = 0x80;
  const dv = new DataView(buf.buffer);
  dv.setUint32(len + padLen,     bitLen >>> 0,              true);
  dv.setUint32(len + padLen + 4, Math.floor(bitLen / 2**32), true);

  const T = [
    0xd76aa478,0xe8c7b756,0x242070db,0xc1bdceee,0xf57c0faf,0x4787c62a,0xa8304613,0xfd469501,
    0x698098d8,0x8b44f7af,0xffff5bb1,0x895cd7be,0x6b901122,0xfd987193,0xa679438e,0x49b40821,
    0xf61e2562,0xc040b340,0x265e5a51,0xe9b6c7aa,0xd62f105d,0x02441453,0xd8a1e681,0xe7d3fbc8,
    0x21e1cde6,0xc33707d6,0xf4d50d87,0x455a14ed,0xa9e3e905,0xfcefa3f8,0x676f02d9,0x8d2a4c8a,
    0xfffa3942,0x8771f681,0x6d9d6122,0xfde5380c,0xa4beea44,0x4bdecfa9,0xf6bb4b60,0xbebfbc70,
    0x289b7ec6,0xeaa127fa,0xd4ef3085,0x04881d05,0xd9d4d039,0xe6db99e5,0x1fa27cf8,0xc4ac5665,
    0xf4292244,0x432aff97,0xab9423a7,0xfc93a039,0x655b59c3,0x8f0ccc92,0xffeff47d,0x85845dd1,
    0x6fa87e4f,0xfe2ce6e0,0xa3014314,0x4e0811a1,0xf7537e82,0xbd3af235,0x2ad7d2bb,0xeb86d391
  ];

  let h0 = 0x67452301, h1 = 0xEFCDAB89, h2 = 0x98BADCFE, h3 = 0x10325476;

  const rl  = (x, n) => (x << n) | (x >>> (32 - n));
  const add = (a, b) => (a + b) | 0;

  for (let i = 0; i < buf.length; i += 64) {
    const M = [];
    for (let j = 0; j < 16; j++) M[j] = dv.getInt32(i + j * 4, true);

    let a = h0, b = h1, c = h2, d = h3;

    // Round 1
    const step = (fn, a,b,c,d, k,s,t) => add(rl(add(add(a, fn(b,c,d)), add(M[k], T[t])), s), b);
    const F = (b,c,d) => (b&c)|(~b&d);
    const G = (b,c,d) => (b&d)|(c&~d);
    const H = (b,c,d) =>  b^c^d;
    const I = (b,c,d) =>  c^(b|~d);

    a=step(F,a,b,c,d, 0, 7, 0); d=step(F,d,a,b,c, 1,12, 1); c=step(F,c,d,a,b, 2,17, 2); b=step(F,b,c,d,a, 3,22, 3);
    a=step(F,a,b,c,d, 4, 7, 4); d=step(F,d,a,b,c, 5,12, 5); c=step(F,c,d,a,b, 6,17, 6); b=step(F,b,c,d,a, 7,22, 7);
    a=step(F,a,b,c,d, 8, 7, 8); d=step(F,d,a,b,c, 9,12, 9); c=step(F,c,d,a,b,10,17,10); b=step(F,b,c,d,a,11,22,11);
    a=step(F,a,b,c,d,12, 7,12); d=step(F,d,a,b,c,13,12,13); c=step(F,c,d,a,b,14,17,14); b=step(F,b,c,d,a,15,22,15);
    // Round 2
    a=step(G,a,b,c,d, 1, 5,16); d=step(G,d,a,b,c, 6, 9,17); c=step(G,c,d,a,b,11,14,18); b=step(G,b,c,d,a, 0,20,19);
    a=step(G,a,b,c,d, 5, 5,20); d=step(G,d,a,b,c,10, 9,21); c=step(G,c,d,a,b,15,14,22); b=step(G,b,c,d,a, 4,20,23);
    a=step(G,a,b,c,d, 9, 5,24); d=step(G,d,a,b,c,14, 9,25); c=step(G,c,d,a,b, 3,14,26); b=step(G,b,c,d,a, 8,20,27);
    a=step(G,a,b,c,d,13, 5,28); d=step(G,d,a,b,c, 2, 9,29); c=step(G,c,d,a,b, 7,14,30); b=step(G,b,c,d,a,12,20,31);
    // Round 3
    a=step(H,a,b,c,d, 5, 4,32); d=step(H,d,a,b,c, 8,11,33); c=step(H,c,d,a,b,11,16,34); b=step(H,b,c,d,a,14,23,35);
    a=step(H,a,b,c,d, 1, 4,36); d=step(H,d,a,b,c, 4,11,37); c=step(H,c,d,a,b, 7,16,38); b=step(H,b,c,d,a,10,23,39);
    a=step(H,a,b,c,d,13, 4,40); d=step(H,d,a,b,c, 0,11,41); c=step(H,c,d,a,b, 3,16,42); b=step(H,b,c,d,a, 6,23,43);
    a=step(H,a,b,c,d, 9, 4,44); d=step(H,d,a,b,c,12,11,45); c=step(H,c,d,a,b,15,16,46); b=step(H,b,c,d,a, 2,23,47);
    // Round 4
    a=step(I,a,b,c,d, 0, 6,48); d=step(I,d,a,b,c, 7,10,49); c=step(I,c,d,a,b,14,15,50); b=step(I,b,c,d,a, 5,21,51);
    a=step(I,a,b,c,d,12, 6,52); d=step(I,d,a,b,c, 3,10,53); c=step(I,c,d,a,b,10,15,54); b=step(I,b,c,d,a, 1,21,55);
    a=step(I,a,b,c,d, 8, 6,56); d=step(I,d,a,b,c,15,10,57); c=step(I,c,d,a,b, 6,15,58); b=step(I,b,c,d,a,13,21,59);
    a=step(I,a,b,c,d, 4, 6,60); d=step(I,d,a,b,c,11,10,61); c=step(I,c,d,a,b, 2,15,62); b=step(I,b,c,d,a, 9,21,63);

    h0=add(h0,a); h1=add(h1,b); h2=add(h2,c); h3=add(h3,d);
  }

  const out = new Uint8Array(16);
  const ov = new DataView(out.buffer);
  ov.setInt32(0, h0, true); ov.setInt32(4, h1, true);
  ov.setInt32(8, h2, true); ov.setInt32(12, h3, true);
  return out;
}

// ─── SHA1 via Web Crypto (async) ─────────────────────────────────────────────
async function sha1(input) {
  const data = toBytes(input);
  const digest = await crypto.subtle.digest('SHA-1', data.buffer);
  return new Uint8Array(digest);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function toBytes(input) {
  if (input instanceof Uint8Array) return input;
  const s = String(input);
  const b = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i) & 0xFF;
  return b;
}

// Fold hash bytes to 64 bits (8 bytes).
// MD4/MD5: 16 bytes → XOR bytes[0..7] with bytes[8..15] (result stays little-endian)
// SHA1:    RFC 2289 Appendix A — read big-endian SHA1 words, XOR-fold, write little-endian
function fold(hashBytes) {
  const out = new Uint8Array(8);
  if (hashBytes.length === 16) {
    for (let i = 0; i < 8; i++) out[i] = hashBytes[i] ^ hashBytes[i + 8];
  } else {
    // SHA1 (20 bytes): read 5 × 32-bit big-endian words
    const dv = new DataView(hashBytes.buffer, hashBytes.byteOffset, hashBytes.byteLength);
    let d0 = dv.getUint32(0,  false);   // word 0 (big-endian)
    let d1 = dv.getUint32(4,  false);   // word 1
    let d2 = dv.getUint32(8,  false);   // word 2
    let d3 = dv.getUint32(12, false);   // word 3
    let d4 = dv.getUint32(16, false);   // word 4
    // RFC 2289 Appendix A: digest[0] ^= digest[2]; digest[1] ^= digest[3]; digest[0] ^= digest[4]
    d0 = (d0 ^ d2 ^ d4) >>> 0;
    d1 = (d1 ^ d3) >>> 0;
    // Store result in little-endian (matching MD4/MD5 output byte order)
    const ov = new DataView(out.buffer);
    ov.setUint32(0, d0, true);
    ov.setUint32(4, d1, true);
  }
  return out;
}

// ─── OTP computation ─────────────────────────────────────────────────────────
async function computeOTP(passphrase, seed, sequence, alg) {
  const seedLower = seed.toLowerCase();
  const firstInput = seedLower + passphrase; // ASCII concat, no separator

  const hash = async (inp) => {
    if      (alg === 'md4') return md4(inp);
    else if (alg === 'md5') return md5(inp);
    else                    return await sha1(inp);
  };

  // RFC 2289 §5.1: hash(seed+pass) once, then apply hash N more times.
  // Total applications = 1 + sequence.
  let current = fold(await hash(firstInput));
  for (let i = 0; i < sequence; i++) {
    current = fold(await hash(current));
  }
  return current; // 8 bytes
}

// ─── Word encoding ────────────────────────────────────────────────────────────
function encodeWords(bytes8) {
  // 2-bit checksum = sum of all 2-bit pairs mod 4
  let cs = 0;
  for (const b of bytes8) cs += ((b>>6)&3) + ((b>>4)&3) + ((b>>2)&3) + (b&3);
  cs &= 3;

  // Pack 64 bits into BigInt, append 2-bit checksum → 66-bit value
  let val = 0n;
  for (const b of bytes8) val = (val << 8n) | BigInt(b);
  val = (val << 2n) | BigInt(cs);

  // Extract 6 × 11-bit indices (MSB first)
  const words = [];
  for (let i = 5; i >= 0; i--) {
    words.push(WORDS[Number((val >> BigInt(i * 11)) & 0x7FFn)]);
  }
  return words.join(' ');
}

// ─── Challenge parser ─────────────────────────────────────────────────────────
function parseChallenge(raw) {
  const s = raw.trim();
  const m = s.match(/^otp-(md4|md5|sha1)\s+(\d+)\s+(\S+)$/i);
  if (!m) return null;
  return { alg: m[1].toLowerCase(), seq: parseInt(m[2], 10), seed: m[3] };
}

// ─── UI logic ─────────────────────────────────────────────────────────────────
function onChallengeChange() {
  const raw = document.getElementById('challenge').value;
  const parsed = parseChallenge(raw);
  if (parsed) {
    document.getElementById('algorithm').value = parsed.alg;
    document.getElementById('error').className = 'error';
  }
  document.getElementById('result').value = '';
}

async function calculate() {
  const errEl = document.getElementById('error');
  const resEl = document.getElementById('result');
  errEl.className = 'error';
  resEl.value = '';

  const rawChallenge = document.getElementById('challenge').value.trim();
  const password     = document.getElementById('password').value;

  if (!rawChallenge) { showError('Please enter a challenge string.'); return; }
  if (!password)     { showError('Please enter a password.'); return; }

  let alg, seq, seed;

  const parsed = parseChallenge(rawChallenge);
  if (parsed) {
    ({ alg, seq, seed } = parsed);
  } else {
    // No valid otp-* prefix in challenge — use selected algorithm,
    // but only if the challenge looks like "<seq> <seed>"
    const manualMatch = rawChallenge.match(/^(\d+)\s+(\S+)$/);
    if (!manualMatch) {
      const prefixMatch = rawChallenge.match(/^otp-(\S+)/i);
      if (prefixMatch) {
        showError(`Unsupported algorithm: "${prefixMatch[1]}". Use otp-md4, otp-md5, or otp-sha1.`);
      } else {
        showError('Invalid challenge format. Expected: otp-{md4|md5|sha1} <sequence> <seed>');
      }
      return;
    }
    alg  = document.getElementById('algorithm').value;
    seq  = parseInt(manualMatch[1], 10);
    seed = manualMatch[2];
  }

  if (seq < 0 || seq > 9999) { showError('Sequence number must be between 0 and 9999.'); return; }

  resEl.value = 'Computing…';
  try {
    const otpBytes = await computeOTP(password, seed, seq, alg);
    resEl.value = encodeWords(otpBytes);

    if (document.getElementById('autoDecrement').checked && seq > 0) {
      const chalEl = document.getElementById('challenge');
      if (parsed) {
        chalEl.value = `otp-${alg} ${seq - 1} ${seed}`;
      } else {
        chalEl.value = `${seq - 1} ${seed}`;
      }
    }

    if (document.getElementById('autoCopy').checked) {
      navigator.clipboard.writeText(resEl.value).catch(() => {});
    }
  } catch (e) {
    resEl.value = '';
    showError('Computation error: ' + e.message);
  }
}

function togglePassword() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = EYE_SHUT;
    btn.style.color = '#53d8fb';
  } else {
    inp.type = 'password';
    btn.innerHTML = EYE_OPEN;
    btn.style.color = '';
  }
}

function copyResult() {
  const val = document.getElementById('result').value;
  if (!val || val === 'Computing…') return;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }, 1500);
  });
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.className = 'error visible';
}

// Allow Enter key to trigger calculation
document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
